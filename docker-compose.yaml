services:

  mysql:
    image: 'mysql:8-debian'
    ports:
      - '3306:3306'
    environment:
      - 'MYSQL_ROOT_PASSWORD=mysql'
    volumes:
      - 'mysql_data:/var/lib/mysql'

  phpmyadmin:
    image: 'phpmyadmin/phpmyadmin'
    ports:
      - '8080:80'
    environment:
      - 'PMA_HOST=mysql'
      - 'PMA_PORT=3306'
      - 'PMA_USER=root'
      - 'PMA_PASSWORD=mysql'
    depends_on:
      - 'mysql'

volumes:
  mysql_data:
